name: Unity SDK CI

on:
  pull_request:
    paths:
      - 'packages/phase-unity/**'
      - 'packages/phase-unity-dotnet/**'
      - '.github/workflows/unity-sdk.yml'
  push:
    branches:
      - main
    paths:
      - 'packages/phase-unity/**'
      - 'packages/phase-unity-dotnet/**'
      - '.github/workflows/unity-sdk.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Verify UPM package layout
        run: node packages/phase-unity-dotnet/scripts/verify-upm-package.js

      - name: Verify Unity source conventions
        run: node packages/phase-unity-dotnet/scripts/verify-unity-sources.js

      - name: Test
        run: dotnet test packages/phase-unity-dotnet/Phase.Analytics.sln --verbosity minimal

      - name: Verify format
        run: dotnet format packages/phase-unity-dotnet/Phase.Analytics.sln --verify-no-changes
